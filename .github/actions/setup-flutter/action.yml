name: Setup Flutter
description: Install Flutter, cache dependencies, and run code generation.

inputs:
  flutter-version:
    description: Flutter SDK version
    required: false
    default: ''
  enable-linux-deps:
    description: Install Linux desktop build dependencies
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Read Flutter version
      id: version
      shell: bash
      run: |
        if [[ -n "${{ inputs.flutter-version }}" ]]; then
          echo "value=${{ inputs.flutter-version }}" >> "$GITHUB_OUTPUT"
        else
          echo "value=$(cat .github/flutter-version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Linux dependencies
      if: inputs.enable-linux-deps == 'true'
      shell: bash
      run: bash tool/ci/setup_linux_deps.sh

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ steps.version.outputs.value }}
        channel: stable
        cache: true

    - name: Cache pub
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          .dart_tool
        key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
        restore-keys: |
          pub-${{ runner.os }}-

    - name: flutter pub get
      shell: bash
      run: flutter pub get

    - name: build_runner
      shell: bash
      run: dart run build_runner build --delete-conflicting-outputs
