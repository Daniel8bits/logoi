name: logoi
arch: amd64
platform: linux
version: "0.0.0"
section: utils
priority: optional
maintainer: "Logoi <noreply@github.com>"
description: |
  Leitura acadêmica com IA integrada.
  Trata cada sessão de leitura como um projeto estruturado.
depends:
  - libgtk-3-0
  - libsecret-1-0
  - libstdc++6
  - libkeybinder-3.0

contents:
  - src: build/linux/x64/release/bundle/
    dst: /opt/logoi
    type: tree
    file_info:
      mode: 0755
  - src: packaging/linux/logoi.desktop
    dst: /usr/share/applications/logoi.desktop
    file_info:
      mode: 0644
  - src: packaging/linux/icons/logoi.png
    dst: /usr/share/icons/hicolor/256x256/apps/logoi.png
    file_info:
      mode: 0644
  - dst: /usr/bin/logoi
    type: symlink
    file_info:
      mode: 0755
    src: /opt/logoi/logoi
